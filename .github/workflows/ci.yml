name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test

  app-generator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-generator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-generator/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run policy:check

  wrapper-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wrapper-template
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run validate
        env:
          EXPO_PUBLIC_APP_URL: https://example.com
          EXPO_PUBLIC_APP_NAME: Wrapper QA
          EXPO_PUBLIC_APP_SLUG: wrapper-qa
          EXPO_PUBLIC_PRIMARY_COLOR: "#0A84FF"
          EXPO_PUBLIC_ACCENT_COLOR: "#34C759"
